// LOGICAL REASONING — 100 questions
const LOGICAL = [
// ── Easy (d:1) ──
{q:"All roses are flowers. Some flowers fade quickly. Which MUST be true?",o:["All roses fade quickly","Some roses fade quickly","Some flowers are roses","No roses fade quickly"],a:2,e:"All roses are flowers → some flowers are roses. We can't determine if roses specifically fade."},
{q:"If it rains, the ground gets wet. The ground is NOT wet. Conclusion?",o:["It's raining","It's not raining","It might rain","The ground is dry"],a:1,e:"Modus tollens: If P→Q and ¬Q, then ¬P. Not wet → not raining."},
{q:"All dogs bark. Rex is a dog. Conclusion?",o:["Rex might bark","Rex barks","Not all dogs bark","Rex isn't a dog"],a:1,e:"Valid syllogism: All dogs bark + Rex is a dog = Rex barks."},
{q:"Tom is older than Jerry. Jerry is older than Spike. Is Tom older than Spike?",o:["Yes","No","Can't tell","Same age"],a:0,e:"Transitive property: Tom > Jerry > Spike → Tom > Spike."},
{q:"If all birds can fly, and penguins are birds, then penguins can fly. What's wrong?",o:["Nothing, it's valid","The premise 'all birds can fly' is false","Penguins aren't birds","The logic is circular"],a:1,e:"The argument is logically valid but unsound — the premise 'all birds can fly' is factually false."},
{q:"If you need a ticket to enter, and you don't have a ticket, what follows?",o:["You can enter","You cannot enter","You need to buy one","The rule doesn't apply"],a:1,e:"If ticket → enter. No ticket → no entry."},
{q:"Monday comes before Tuesday. Wednesday comes after Tuesday. What day is between Monday and Wednesday?",o:["Sunday","Tuesday","Thursday","Saturday"],a:1,e:"Monday → Tuesday → Wednesday. Tuesday is between."},
{q:"If A=1, B=2, C=3, what is A+B+C?",o:["5","6","7","3"],a:1,e:"1+2+3=6."},
{q:"Some cats are black. Some black things are hats. Must some cats be hats?",o:["Yes","No","Maybe","Only black cats"],a:1,e:"No — 'some A are B' and 'some B are C' doesn't mean any A are C. The overlap could be empty."},
{q:"If today is Friday, what day was it 3 days ago?",o:["Monday","Tuesday","Wednesday","Thursday"],a:1,e:"Friday minus 3 days: Thu, Wed, Tue. Three days ago was Tuesday."},
{q:"All squares are rectangles. All rectangles have four sides. What follows?",o:["All squares have four sides","All four-sided shapes are squares","Some rectangles are not squares","Squares have five sides"],a:0,e:"Squares⊂rectangles⊂four-sided → squares have four sides."},
{q:"If no fish can walk, and a trout is a fish, can a trout walk?",o:["Yes","No","Maybe","Only on land"],a:1,e:"No fish can walk + trout is a fish → trout cannot walk."},
{q:"I have more than 3 apples and fewer than 7. How many could I have?",o:["3","5","7","2"],a:1,e:"More than 3 and fewer than 7 means 4, 5, or 6. Only 5 is in the options."},
{q:"All A are B. All B are C. Is it true that all A are C?",o:["Yes","No","Not enough info","Only some A"],a:0,e:"A⊂B⊂C → A⊂C. All A are C."},
{q:"If the light is on, someone is home. The light is off. Conclusion?",o:["No one is home","Someone might be home","Someone is home","The bulb is broken"],a:1,e:"Light on → someone home. But light off doesn't guarantee no one is home (they could be in the dark). The converse is not necessarily true."},
{q:"Which is the odd one out: 2, 5, 8, 12, 14?",o:["2","5","12","14"],a:2,e:"2,5,8,14 are all in a pattern (+3,+3,+6? No.) Actually: 2,5,8,11,14 would be +3 each. 12 breaks the pattern (should be 11)."},
{q:"Sam is taller than Pam. Pam is taller than Cam. Who is tallest?",o:["Cam","Pam","Sam","Can't tell"],a:2,e:"Sam > Pam > Cam. Sam is tallest."},
{q:"If I study, I pass. I passed. Did I study?",o:["Yes, definitely","Not necessarily","No","I failed"],a:1,e:"Study→pass, but passing doesn't prove studying — could have passed another way. Affirming the consequent is a fallacy."},
{q:"There are 5 cookies. Tim takes 2. How many are left?",o:["2","3","4","5"],a:1,e:"5−2=3 cookies remain."},
{q:"No reptiles have fur. A lizard is a reptile. Conclusion?",o:["Lizards have fur","Lizards don't have fur","Some lizards have fur","Can't determine"],a:1,e:"No reptiles have fur + lizard is a reptile → lizards don't have fur."},
{q:"If today is the day before Thursday, what day is today?",o:["Tuesday","Wednesday","Thursday","Friday"],a:1,e:"The day before Thursday is Wednesday."},
{q:"All students have IDs. Maria has an ID. Is Maria a student?",o:["Yes","No","Not necessarily","Definitely"],a:2,e:"All students have IDs, but having an ID doesn't make you a student — non-students can also have IDs."},
{q:"If X > Y and Y > Z, which is smallest?",o:["X","Y","Z","Can't tell"],a:2,e:"X > Y > Z → Z is smallest."},
{q:"Blue beats Red. Red beats Green. Does Blue beat Green?",o:["Yes","No","Not necessarily","It's a tie"],a:2,e:"Transitivity isn't guaranteed in all game/competition contexts. Blue beats Red and Red beats Green doesn't necessarily mean Blue beats Green (think Rock-Paper-Scissors)."},
{q:"If there are only red and blue marbles in a bag, and you pick one that isn't red, what color is it?",o:["Red","Green","Blue","Yellow"],a:2,e:"Only red and blue exist. Not red → must be blue."},

{q:"Alex, Blake, Casey: tennis/soccer/swimming. Alex≠tennis. Blake≠soccer,≠tennis. Casey?",o:["Tennis","Soccer","Swimming","Can't tell"],a:0,e:"Blake→swimming. Alex≠tennis, Blake=swimming → Alex=soccer. Casey=tennis."},

{q:"A clock shows 3:15. What is the angle between the hour and minute hands?",o:["0°","7.5°","90°","45°"],a:1,e:"At 3:15, minute hand at 3 (90°). Hour hand has moved past 3 by 15 min × 0.5°/min = 7.5°. Angle = 7.5°."},

{q:"There are 3 boxes: one has apples, one oranges, one mixed. All labels are wrong. You pick from 'Mixed' and get an apple. What's in the 'Oranges' box?",o:["Oranges","Apples","Mixed","Can't tell"],a:2,e:"'Mixed' label is wrong and has apples. 'Apples' label is wrong so can't have apples → has oranges or mixed. 'Oranges' label is wrong → has apples or mixed. Since apples are in 'Mixed' box, 'Oranges' box has the mix."},

{q:"If 3 people can paint 3 rooms in 3 hours, how long for 9 people to paint 9 rooms?",o:["1 hour","3 hours","9 hours","27 hours"],a:1,e:"1 person paints 1 room in 3 hours. 9 people paint 9 rooms (1 each) in 3 hours."},

{q:"If all Bloops are Razzies, and all Razzies are Lazzies, are all Bloops Lazzies?",o:["Yes","No","Not necessarily","Sometimes"],a:0,e:"Bloops⊂Razzies⊂Lazzies → Bloops⊂Lazzies. All Bloops are Lazzies."},
{q:"A man has 53 socks: 21 blue, 15 black, 17 red. In the dark, how many must he take to guarantee a matching pair?",o:["2","3","4","27"],a:2,e:"Worst case: 1 of each color (3). The 4th must match one. Answer: 4."},
{q:"If the day after tomorrow is Thursday, what day was yesterday?",o:["Sunday","Monday","Tuesday","Wednesday"],a:1,e:"Day after tomorrow = Thursday → tomorrow = Wednesday → today = Tuesday → yesterday = Monday."},
{q:"There are 100 people. 90 drink coffee, 80 drink tea, 70 drink juice. What's the minimum who drink all three?",o:["10","20","30","40"],a:3,e:"By inclusion-exclusion minimum: 90+80+70−200=40. At least 40 must drink all three."},
{q:"Statement: 'This statement is false.' Is it true or false?",o:["True","False","Paradoxical","Meaningless"],a:2,e:"If true, it's false (contradiction). If false, it's true (contradiction). Classic Liar's Paradox."},
{q:"In a group of 6, each person knows exactly 3 others. Is this possible?",o:["Yes","No","Only with 7 people","Need more info"],a:0,e:"6×3=18 'know' relationships, but each is counted twice → 9 pairs. 9 undirected edges among 6 nodes where each has degree 3 is possible (e.g., complete bipartite K₃,₃)."},
{q:"If 'all cats are animals' is true, which must also be true?",o:["All animals are cats","No cats are non-animals","If not cat, not animal","Some animals are not cats"],a:1,e:"'All cats are animals' ≡ 'No cats are non-animals.' The others are fallacies."},
{q:"A sundial has the fewest moving parts of any timepiece. How many?",o:["0","1","2","3"],a:0,e:"A sundial has no moving parts — the shadow moves as the sun does."},
{q:"Two fathers and two sons go fishing. They catch 3 fish, 1 each. How?",o:["One didn't fish","There are only 3 people","One caught 2","They shared"],a:1,e:"Grandfather, father, son = 2 fathers (grandfather+father) and 2 sons (father+son), but only 3 people."},
{q:"If P → Q and Q → R, and P is true, what do we know?",o:["Only Q is true","Only R is true","Both Q and R are true","Nothing certain"],a:2,e:"P→Q: P true → Q true. Q→R: Q true → R true. Both Q and R are true."},
{q:"You have 8 identical-looking balls. One is heavier. Using a balance scale, minimum weighings to find it?",o:["1","2","3","4"],a:1,e:"Divide into 3-3-2. Weigh 3v3. If equal, weigh the 2. If unequal, take the heavier 3 and weigh 1v1 (3rd is answer if equal). 2 weighings."},
{q:"If no heroes are cowards, and some soldiers are heroes, what follows?",o:["No soldiers are cowards","Some soldiers are not cowards","All soldiers are heroes","All cowards are soldiers"],a:1,e:"Some soldiers are heroes, and no heroes are cowards → those soldier-heroes are not cowards → some soldiers are not cowards."},
{q:"If BLUE means STOP and YELLOW means GO, when you see BLUE, what do you do?",o:["Go","Stop","Slow down","Turn"],a:1,e:"BLUE = STOP. You see BLUE → you stop. Just follow the defined rule."},
{q:"A is B's child. B is C's child. What is A to C?",o:["Child","Grandchild","Parent","Sibling"],a:1,e:"A is child of B, B is child of C → A is grandchild of C."},
{q:"A survey shows 60% like chocolate, 50% like vanilla, and 30% like both. What % like neither?",o:["10%","15%","20%","40%"],a:2,e:"Like at least one: 60+50−30=80%. Neither: 100−80=20%."},
{q:"If every winner practiced, and Alex didn't practice, what can we say about Alex?",o:["Alex won","Alex didn't win","Alex might have won","Alex is lazy"],a:1,e:"All winners practiced. Alex didn't practice. By contrapositive → Alex didn't win."},
{q:"An electric train moves north at 100 km/h. Wind blows east at 50 km/h. Which way does the smoke blow?",o:["East","North","West","No smoke — it's electric"],a:3,e:"Electric trains don't produce smoke."},
{q:"If RED=3, BLUE=4, GREEN=5, what is YELLOW?",o:["5","6","7","8"],a:1,e:"The number = count of letters in the word: RED(3), BLUE(4), GREEN(5), YELLOW(6)."},
{q:"If exactly one of these statements is true: (A) 2+2=4, (B) 3+3=6, (C) 1+1=3, which is the true one?",o:["A only","B only","C only","The premise is flawed"],a:3,e:"Both A and B are mathematically true, so 'exactly one is true' is a false premise."},
{q:"You're given that all X are Y, no Y are Z. What must be true?",o:["Some X are Z","No X are Z","All Z are X","Some Z are Y"],a:1,e:"X⊂Y, Y∩Z=∅ → X∩Z=∅. No X are Z."},
{q:"4 cards show A, B, 1, 2. Rule: if a card has a vowel on one side, it has an even number on the other. Which cards must you flip to test this?",o:["A and 1","A and 2","A only","All four"],a:0,e:"Flip A (check if even is on back) and 1 (check if vowel is on back — would violate the rule). B and 2 don't need checking."},

{q:"A says 'I am a liar.' If people always tell truth or always lie, what is A?",o:["A liar","Truthful","Paradoxical","Can't determine"],a:2,e:"If truthful: 'I'm a liar'=true → contradiction. If liar: 'I'm a liar'=false → truthful → contradiction. Paradox."},
{q:"On an island, knights always tell truth, knaves always lie. A says 'We are both knaves.' What are A and B?",o:["Both knights","Both knaves","A=knave, B=knight","A=knight, B=knave"],a:2,e:"If A is knight: 'both knaves' is true → A is knave → contradiction. So A is knave. 'Both knaves' is false → B is not a knave → B is knight."},

// Assemble full bank with IDs, categories, difficulties
function buildBank() {
  const cats = [
    ["Verbal Comprehension", VERBAL],
    ["Numerical Reasoning", NUMERICAL],
    ["Pattern Recognition", [...PATTERN, ...EXTRA_PATTERN]],
    ["Logical Reasoning", [...LOGICAL, ...EXTRA_LOGICAL]],
    ["Spatial Reasoning", SPATIAL]
  ];
  const bank = [];
  cats.forEach(([cat, qs]) => {
    const easy = [], med = [], hard = [];
    qs.forEach((q, i) => {
      // Auto-assign difficulty by position: first third easy, second medium, last hard
      const third = qs.length / 3;
      const d = i < third ? 1 : i < third * 2 ? 2 : 3;
      bank.push({ ...q, id: `${cat[0].toLowerCase()}${i}`, category: cat, difficulty: d });
    });
  });
  return bank;
}

const ALL_QUESTIONS = buildBank();

// ─── UTILITIES ─────────────────────────────────────────────
function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

function selectQuestions() {
  const cats = [...new Set(ALL_QUESTIONS.map(q => q.category))];
  const sel = [];
  cats.forEach(c => {
    const cq = ALL_QUESTIONS.filter(q => q.category === c);
    sel.push(
      ...shuffle(cq.filter(q => q.difficulty === 1)).slice(0, 2),
      ...shuffle(cq.filter(q => q.difficulty === 2)).slice(0, 2),
      ...shuffle(cq.filter(q => q.difficulty === 3)).slice(0, 2)
    );
  });
  sel.sort((a, b) => {
    const ci = cats.indexOf(a.category) - cats.indexOf(b.category);
    return ci !== 0 ? ci : a.difficulty - b.difficulty;
  });
  return sel;
}

// ─── IQ SCORING ─────────────────────────────────────────────
function calculateIQ(ans, qs, timeSec, totalSec) {
  const dw = { 1: 1, 2: 2, 3: 3 };
  let earned = 0, max = 0;
  qs.forEach(q => {
    const w = dw[q.difficulty] || 1;
    max += w;
    if (ans[q.id] === q.answer) earned += w;
  });
  const wPct = earned / max;
  const z = Math.max(-3, Math.min(3, (wPct - 0.50) / 0.20));
  const tBonus = Math.round(Math.max(0, 1 - timeSec / totalSec) * 5);
  const iq = Math.max(55, Math.min(160, Math.round(100 + 15 * z + tBonus)));
  return { iq, earned, max, wPct, z: z.toFixed(2), tBonus, correct: qs.filter(q => ans[q.id] === q.answer).length, total: qs.length, timeSec };
}

function catScore(ans, qs, cat) {
  const cq = qs.filter(q => q.category === cat);
  const c = cq.filter(q => ans[q.id] === q.answer).length;
  return { correct: c, total: cq.length, pct: Math.round(c / cq.length * 100) };
}

function iqLabel(iq) {
  if (iq >= 145) return "Exceptionally Gifted";
  if (iq >= 130) return "Very Superior";
  if (iq >= 120) return "Superior";
  if (iq >= 110) return "High Average";
  if (iq >= 90) return "Average";
  if (iq >= 80) return "Low Average";
  if (iq >= 70) return "Borderline";
  return "Below Average";
}

function pctile(iq) {
  const z = (iq - 100) / 15;
  const t = 1 / (1 + .2316419 * Math.abs(z));
  const d = .3989422804 * Math.exp(-z * z / 2);
  const p = d * t * (.3193815 + t * (-.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
  return Math.min(99.9, Math.max(0.1, (z > 0 ? 1 - p : p) * 100)).toFixed(1);
}

function fmt(s) { return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, "0")}`; }

              <div style={{ display: "flex", gap: 4, background: "#f0f0f0", borderRadius: 8, padding: 3 }}>
                {[["wrong", "Wrong", wrong.length, "#D44"], ["all", "All", total, "#333"]].map(([k, l, n, c]) =>
                  <button key={k} style={{ padding: "6px 16px", fontSize: 13, ...S.sans, fontWeight: 600, border: "none", borderRadius: 6, cursor: "pointer", background: rf === k ? c : "transparent", color: rf === k ? "#fff" : "#666" }} onClick={() => setRf(k)}>{l} ({n})</button>
                )}
              </div>
            </div>
            {(rf === "wrong" ? wrong : qs).map(q => {
              const ua = ans[q.id], ic = ua === q.answer, sk = ua === undefined;
              return (
                <div key={q.id} style={{ background: "#fff", borderRadius: 12, padding: "20px 24px", marginBottom: 12, boxShadow: "0 1px 2px rgba(0,0,0,.04)", borderLeft: `4px solid ${ic ? "#4CAF50" : "#D44"}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, flexWrap: "wrap", gap: 8 }}>
                    <span style={{ padding: "4px 12px", borderRadius: 6, fontSize: 12, ...S.sans, fontWeight: 700, background: ic ? "#4CAF5020" : "#D4440020", color: ic ? "#2E7D32" : "#C62828" }}>{ic ? "✓ Correct" : sk ? "— Skipped" : "✗ Wrong"}</span>
                    <span style={{ padding: "3px 10px", borderRadius: 6, fontSize: 11, ...S.sans, border: `1.5px solid ${CC[q.category]}`, color: "#666" }}>{CI[q.category]} {q.category}</span>
                  </div>
                  <p style={{ fontSize: 16, lineHeight: 1.6, color: "#1a1a1a", marginBottom: 14 }}>{q.q}</p>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 14 }}>
                    {q.o.map((o, i) => {
                      const ia = i === q.answer, iw = i === ua && !ic;
                      return (
                        <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 8, fontSize: 14, ...S.sans, border: `1.5px solid ${ia ? "#4CAF50" : iw ? "#D44" : "#e0e0e0"}`, background: ia ? "#4CAF5015" : iw ? "#D4440015" : "transparent" }}>
                          <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 26, height: 26, borderRadius: 6, fontSize: 12, fontWeight: 700, flexShrink: 0, background: ia ? "#4CAF50" : iw ? "#D44" : "#eee", color: (ia || iw) ? "#fff" : "#888" }}>{ia ? "✓" : iw ? "✗" : String.fromCharCode(65 + i)}</span>
                          <span style={{ fontWeight: ia ? 600 : 400, color: ia ? "#2E7D32" : iw ? "#C62828" : "#333" }}>{o}</span>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{ background: "#F8F6F2", borderRadius: 8, padding: "12px 16px", fontSize: 13, lineHeight: 1.7, color: "#555", ...S.sans }}><strong>Explanation:</strong> {q.e}</div>
                </div>
              );
            })}
            <button style={S.btn("#2C3E50", "#fff")} onClick={start}>Retake Test</button>
          </div>}
          <p style={{ textAlign: "center", fontSize: 12, color: "#aaa", ...S.sans, lineHeight: 1.6, marginTop: 20, padding: "0 20px" }}>Educational estimate only. For clinical IQ, consult a licensed psychologist using WAIS-V, Stanford-Binet, or Raven's APM.</p>
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(React.StrictMode, null, React.createElement(IQTest))
);
</script>
</body>
</html>
