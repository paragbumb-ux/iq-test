// ─── SVG VISUAL BUILDERS ─────────────────────────────────────────
const SC = { red: "#E06060", blue: "#5090D0", green: "#50A868", purple: "#9070C0", orange: "#E0943A", grey: "#AAA" };

function drawShape(type, cx, cy, size, fill) {
  const s = size;
  if (type === "circle") return `<circle cx="${cx}" cy="${cy}" r="${s * 0.38}" fill="${fill}"/>`;
  if (type === "square") { const h = s * 0.34; return `<rect x="${cx-h}" y="${cy-h}" width="${h*2}" height="${h*2}" fill="${fill}" rx="2"/>`; }
  if (type === "triangle") { const h = s * 0.38; return `<polygon points="${cx},${cy-h} ${cx-h},${cy+h*0.7} ${cx+h},${cy+h*0.7}" fill="${fill}"/>`; }
  if (type === "diamond") { const h = s * 0.38; return `<polygon points="${cx},${cy-h} ${cx+h*0.7},${cy} ${cx},${cy+h} ${cx-h*0.7},${cy}" fill="${fill}"/>`; }
  if (type === "pentagon") { const h=s*0.35; const pts=Array.from({length:5},(_,i)=>{const a=(i*72-90)*Math.PI/180;return `${cx+h*Math.cos(a)},${cy+h*Math.sin(a)}`;}).join(" "); return `<polygon points="${pts}" fill="${fill}"/>`; }
  if (type === "hexagon") { const h=s*0.35; const pts=Array.from({length:6},(_,i)=>{const a=(i*60-30)*Math.PI/180;return `${cx+h*Math.cos(a)},${cy+h*Math.sin(a)}`;}).join(" "); return `<polygon points="${pts}" fill="${fill}"/>`; }
  if (type === "star") { const o=s*0.38,n=s*0.18; const pts=Array.from({length:10},(_,i)=>{const a=(i*36-90)*Math.PI/180;const r=i%2===0?o:n;return `${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;}).join(" "); return `<polygon points="${pts}" fill="${fill}"/>`; }
  return "";
}

function optVisSvg(opts, w, h) {
  const each = w / opts.length;
  let s = `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${w}px;margin-top:8px">`;
  opts.forEach((o, i) => {
    const x = i * each;
    s += `<rect x="${x+2}" y="2" width="${each-4}" height="${h-4}" fill="#fff" stroke="#ccc" stroke-width="1" rx="6"/>`;
    s += `<text x="${x+each/2}" y="16" text-anchor="middle" font-size="11" fill="#888" font-family="sans-serif" font-weight="700">${String.fromCharCode(65+i)}</text>`;
    if (o) s += drawShape(o.shape, x + each / 2, h / 2 + 6, Math.min(each, h) * 0.65, o.fill || "#555");
  });
  return s + "</svg>";
}

function dotsSvg(count, cx, cy, sz) {
  const cols = Math.ceil(Math.sqrt(count)), rows = Math.ceil(count / cols);
  const gap = sz / (Math.max(cols, rows) + 1);
  const sx = cx - (cols - 1) * gap / 2, sy = cy - (rows - 1) * gap / 2;
  let s = "";
  for (let i = 0; i < count; i++) { const r = Math.floor(i/cols), c = i%cols; s += `<circle cx="${sx+c*gap}" cy="${sy+r*gap}" r="4" fill="#444"/>`; }
  return s;
}

function arrowSvg(x, y, angle, len, color="#555") {
  const rad=angle*Math.PI/180, ex=x+len*Math.cos(rad), ey=y+len*Math.sin(rad), ah=6;
  const a1=angle+150, a2=angle-150;
  return `<line x1="${x}" y1="${y}" x2="${ex}" y2="${ey}" stroke="${color}" stroke-width="2"/><polygon points="${ex},${ey} ${ex+ah*Math.cos(a1*Math.PI/180)},${ey+ah*Math.sin(a1*Math.PI/180)} ${ex+ah*Math.cos(a2*Math.PI/180)},${ey+ah*Math.sin(a2*Math.PI/180)}" fill="${color}"/>`;
}

      const grid=[[["circle",SC.red],["square",SC.blue],["triangle",SC.green]],[["square",SC.green],["triangle",SC.red],["circle",SC.blue]],[["triangle",SC.green],["circle",SC.red],null]];
      for(let r=0;r<3;r++)for(let c=0;c<3;c++){const x=50+c*100,y=50+r*100;s+=`<rect x="${x-42}" y="${y-42}" width="84" height="84" fill="#fff" stroke="#ddd" stroke-width="1" rx="4"/>`;const cell=grid[r][c];if(cell)s+=drawShape(cell[0],x,y,70,cell[1]);else s+=`<text x="${x}" y="${y+8}" text-anchor="middle" font-size="28" font-weight="700" fill="#c44" font-family="sans-serif">?</text>`;}

  { id:"p11",category:"Pattern Recognition",difficulty:2,
    question:"Dots grow as triangular numbers: 1, 3, 6, 10. How many in Frame 5?",
    visual:()=>{

// ─── UTILITIES ──────────────────────────────────────────────────
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function selectQuestions(){
  const cats=[...new Set(ALL_QUESTIONS.map(q=>q.category))],sel=[];
  cats.forEach(c=>{const cq=ALL_QUESTIONS.filter(q=>q.category===c);
    sel.push(...shuffle(cq.filter(q=>q.difficulty===1)).slice(0,2),...shuffle(cq.filter(q=>q.difficulty===2)).slice(0,2),...shuffle(cq.filter(q=>q.difficulty===3)).slice(0,2));});
  sel.sort((a,b)=>{const ci=cats.indexOf(a.category)-cats.indexOf(b.category);return ci!==0?ci:a.difficulty-b.difficulty;});
  return sel;
}

function calculateIQ(ans,qs,timeSec,totalSec){
  const dw={1:1,2:2,3:3};let earned=0,max=0;
  qs.forEach(q=>{const w=dw[q.difficulty]||1;max+=w;if(ans[q.id]===q.answer)earned+=w;});
  const wPct=earned/max;
  const z=Math.max(-3,Math.min(3,(wPct-0.50)/0.20));
  const tBonus=Math.round(Math.max(0,1-timeSec/totalSec)*5);
  const iq=Math.max(55,Math.min(160,Math.round(100+15*z+tBonus)));
  return{iq,earned,max,wPct,z:z.toFixed(2),tBonus,correct:qs.filter(q=>ans[q.id]===q.answer).length,total:qs.length,timeSec};
}

function catScore(ans,qs,cat){const cq=qs.filter(q=>q.category===cat);const c=cq.filter(q=>ans[q.id]===q.answer).length;return{correct:c,total:cq.length,pct:Math.round(c/cq.length*100)};}

function iqLabel(iq){if(iq>=145)return"Exceptionally Gifted";if(iq>=130)return"Very Superior";if(iq>=120)return"Superior";if(iq>=110)return"High Average";if(iq>=90)return"Average";if(iq>=80)return"Low Average";if(iq>=70)return"Borderline";return"Below Average";}

function percentile(iq){const z=(iq-100)/15;const t=1/(1+.2316419*Math.abs(z));const d=.3989422804*Math.exp(-z*z/2);const p=d*t*(.3193815+t*(-.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));return Math.min(99.9,Math.max(0.1,(z>0?1-p:p)*100)).toFixed(1);}

function fmt(s){return`${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}`;}

const CI={
  "Verbal Comprehension":"🔤","Numerical Reasoning":"🔢",
  "Pattern Recognition":"🔳","Logical Reasoning":"🧠","Spatial Reasoning":"📐"
};
const CC={
  "Verbal Comprehension":"#E8B4B8","Numerical Reasoning":"#B8D4E3",
  "Pattern Recognition":"#D4C5A9","Logical Reasoning":"#C3B1E1","Spatial Reasoning":"#A8D5BA"
};
const TT=25*60;

// ─── COMPONENT ──────────────────────────────────────────────────
export default function IQTest(){
  const[phase,setPhase]=useState("intro");
  const[qs,setQs]=useState([]);
  const[ci,setCi]=useState(0);
  const[ans,setAns]=useState({});
  const[tl,setTl]=useState(TT);
  const[st,setSt]=useState(null);
  const[et,setEt]=useState(null);
  const[sel,setSel]=useState(null);
  const[rev,setRev]=useState(false);
  const[rf,setRf]=useState("wrong");
  const[sf,setSf]=useState(false);
  const[ai,setAi]=useState(true);
  const tr=useRef(null);

  const start=useCallback(()=>{setQs(selectQuestions());setCi(0);setAns({});setTl(TT);setSt(Date.now());setEt(null);setPhase("test");setAi(true);setRev(false);setSf(false);},[]);

  useEffect(()=>{if(phase!=="test")return;tr.current=setInterval(()=>{setTl(p=>{if(p<=1){clearInterval(tr.current);setEt(Date.now());setPhase("results");return 0;}return p-1;});},1000);return()=>clearInterval(tr.current);},[phase]);

  const pick=(idx)=>{setSel(idx);setTimeout(()=>{const q=qs[ci];setAns(p=>({...p,[q.id]:idx}));setSel(null);if(ci<qs.length-1){setAi(false);setTimeout(()=>{setCi(c=>c+1);setAi(true);},200);}else{clearInterval(tr.current);setEt(Date.now());setPhase("results");}},350);};

  const skip=()=>{if(ci<qs.length-1){setAi(false);setTimeout(()=>{setCi(c=>c+1);setAi(true);},200);}else{clearInterval(tr.current);setEt(Date.now());setPhase("results");}};

  const res=useMemo(()=>{
    if(phase!=="results"||!qs.length)return null;
    const tu=et?Math.round((et-st)/1000):TT;
    const r=calculateIQ(ans,qs,tu,TT);
    const cats=[...new Set(qs.map(q=>q.category))];
    const cs={};cats.forEach(c=>{cs[c]=catScore(ans,qs,c);});
    return{...r,cs,cats,wrong:qs.filter(q=>ans[q.id]!==q.answer)};
  },[phase,qs,ans,st,et]);

  // ═══ INTRO ═══
  if(phase==="intro") return(
    <div style={S.ctn}>
      <div style={S.ic}>
        <div style={S.logo}>IQ</div>
        <h1 style={S.ti}>Cognitive Assessment</h1>
        <p style={S.st2}>Comprehensive Intelligence Evaluation</p>
        <div style={S.div}/>
        <p style={S.it}>This assessment measures cognitive ability across five domains inspired by the Wechsler Adult Intelligence Scale (WAIS-V) and Raven's Progressive Matrices — two of the most respected psychometric instruments in use today.</p>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:28,textAlign:"left"}}>
          {Object.entries(CI).map(([c,i])=><div key={c} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"var(--bg-secondary,#fafafa)",borderRadius:8,borderLeft:`3px solid ${CC[c]}`}}><span style={{fontSize:18}}>{i}</span><span style={{fontSize:14,fontFamily:"'DM Sans',sans-serif",color:"var(--text-primary,#333)",fontWeight:500}}>{c}</span></div>)}
        </div>
        <div style={S.mr}>
          <div style={S.mi}><div style={S.mv}>30</div><div style={S.ml}>Questions</div></div>
          <div style={S.ms}/><div style={S.mi}><div style={S.mv}>25</div><div style={S.ml}>Minutes</div></div>
          <div style={S.ms}/><div style={S.mi}><div style={S.mv}>3</div><div style={S.ml}>Difficulty Tiers</div></div>
        </div>
        <div style={S.nb}><strong>Scoring:</strong> Difficulty-weighted percentage mapped to IQ via probit function (mean=100, SD=15, Wechsler convention). Full formula shown with results.<br/><br/><strong>Note:</strong> Educational estimate only. For clinical IQ, consult a licensed psychologist.</div>
        <button style={S.sb} onClick={start}>Begin Assessment</button>
      </div>
    </div>
  );

  // ═══ TEST ═══
  if(phase==="test"&&qs.length>0){
    const q=qs[ci],prog=(ci/qs.length)*100,urg=tl<120,cc=CC[q.category]||"#ccc";
    return(
      <div style={S.ctn}>
        <div style={{display:"flex",alignItems:"center",width:"100%",maxWidth:640,padding:"12px 0",gap:16}}>
          <span style={{fontSize:20,fontWeight:400,color:"var(--text-primary,#1a1a1a)"}}>{ci+1}<span style={{fontSize:14,color:"var(--text-secondary,#999)"}}> /{qs.length}</span></span>
          <div style={{flex:1}}><div style={{height:4,background:"var(--border-color,#e0e0e0)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",background:"#2C3E50",borderRadius:2,transition:"width .4s",width:`${prog}%`}}/></div></div>
          <span style={{fontFamily:"'DM Mono','SF Mono',monospace",fontSize:16,fontWeight:500,color:urg?"#D44":"var(--text-secondary,#666)"}}>⏱ {fmt(tl)}</span>
        </div>
        <div style={{...S.qc,opacity:ai?1:0,transform:ai?"translateY(0)":"translateY(20px)",transition:"all .3s ease"}}>
          <div style={{display:"inline-block",padding:"5px 14px",borderRadius:20,fontSize:12,fontFamily:"'DM Sans',sans-serif",fontWeight:600,color:"#333",letterSpacing:.5,marginBottom:12,background:cc}}>{CI[q.category]} {q.category}</div>
          <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:20}}>
            {[1,2,3].map(d=><span key={d} style={{width:8,height:8,borderRadius:"50%",display:"inline-block",background:d<=q.difficulty?cc:"var(--border-color,#ddd)"}}/>)}
            <span style={{marginLeft:8,fontSize:11,fontFamily:"'DM Sans',sans-serif",color:"var(--text-secondary,#999)",textTransform:"uppercase",letterSpacing:1.5}}>{q.difficulty===1?"Standard":q.difficulty===2?"Advanced":"Expert"}</span>
          </div>
          <h2 style={{fontSize:19,fontWeight:400,lineHeight:1.6,color:"var(--text-primary,#1a1a1a)",marginBottom:16,marginTop:0}}>{q.question}</h2>
          {q.visual&&<div style={{margin:"0 auto 18px",textAlign:"center"}} dangerouslySetInnerHTML={{__html:q.visual()}}/>}
          {q.optionVisuals&&<div style={{margin:"0 auto 10px",textAlign:"center"}} dangerouslySetInnerHTML={{__html:q.optionVisuals()}}/>}
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
            {q.options.map((o,i)=>{const is=sel===i;return(
              <button key={i} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 18px",borderRadius:12,border:`1.5px solid ${is?cc:"var(--border-color,#d0d0d0)"}`,cursor:"pointer",transition:"all .2s",textAlign:"left",fontSize:15,fontFamily:"'DM Sans',sans-serif",color:"var(--text-primary,#333)",background:is?cc+"18":"var(--bg-secondary,#fafafa)",transform:is?"scale(.98)":"scale(1)"}} onClick={()=>pick(i)} disabled={sel!==null}>
                <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:30,height:30,borderRadius:8,fontSize:13,fontWeight:700,flexShrink:0,transition:"all .2s",background:is?cc:"var(--bg-tertiary,#eee)",color:is?"#fff":"var(--text-secondary,#666)"}}>{String.fromCharCode(65+i)}</span>
                <span style={{lineHeight:1.4}}>{o}</span>
              </button>
            );})}
          </div>
          <button style={{display:"block",margin:"0 auto",background:"none",border:"none",color:"var(--text-secondary,#999)",fontSize:13,fontFamily:"'DM Sans',sans-serif",cursor:"pointer",padding:"8px 16px"}} onClick={skip} disabled={sel!==null}>Skip →</button>
        </div>
      </div>
    );
  }

  // ═══ RESULTS ═══
  if(phase==="results"&&res){
    const{iq,earned,max,wPct,z,tBonus,correct,total,timeSec,cs,cats,wrong}=res;
    const pct=percentile(iq),lbl=iqLabel(iq),gp=Math.max(0,Math.min(1,(iq-55)/105));

    return(
      <div style={S.ctn}>
        <div style={{maxWidth:700,width:"100%",paddingBottom:40}}>
          {!rev&&<>
            {/* Score */}
            <div style={S.sc}>
              <div style={{fontSize:12,textTransform:"uppercase",letterSpacing:3,color:"var(--text-secondary,#888)",fontFamily:"'DM Sans',sans-serif",marginBottom:8}}>Your Estimated IQ</div>
              <div style={{margin:"8px 0"}}><span style={{fontSize:80,fontWeight:400,color:"var(--text-primary,#1a1a1a)",lineHeight:1,letterSpacing:"-.03em"}}>{iq}</span></div>
              <div style={{fontSize:18,color:"var(--text-secondary,#555)",fontFamily:"'DM Sans',sans-serif",fontWeight:500,marginBottom:12}}>{lbl}</div>
              <div style={{fontSize:13,color:"var(--text-secondary,#888)",fontFamily:"'DM Sans',sans-serif",display:"flex",justifyContent:"center",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <span>Percentile: <strong>{pct}%</strong></span><span style={{color:"var(--border-color,#ccc)"}}>•</span>
                <span>{correct}/{total} correct</span><span style={{color:"var(--border-color,#ccc)"}}>•</span><span>{fmt(timeSec)} elapsed</span>
              </div>
              <div style={{maxWidth:500,margin:"20px auto 0"}}>
                <div style={{position:"relative",height:12,borderRadius:6,display:"flex",overflow:"visible",marginBottom:6}}>
                  <div style={{flex:15,background:"#E57373",borderRadius:"6px 0 0 6px"}}/><div style={{flex:15,background:"#FFB74D"}}/><div style={{flex:15,background:"#FFF176"}}/><div style={{flex:15,background:"#AED581"}}/><div style={{flex:15,background:"#4DB6AC"}}/><div style={{flex:30,background:"#7986CB",borderRadius:"0 6px 6px 0"}}/>
                  <div style={{position:"absolute",top:-6,left:`${gp*100}%`,transform:"translateX(-50%)",display:"flex",flexDirection:"column",alignItems:"center",zIndex:2}}>
                    <div style={{width:22,height:22,borderRadius:"50%",background:"#2C3E50",border:"3px solid #fff",boxShadow:"0 2px 8px rgba(0,0,0,.3)"}}/>
                    <div style={{fontSize:11,fontWeight:700,fontFamily:"'DM Sans',sans-serif",color:"var(--text-primary,#333)",marginTop:4}}>{iq}</div>
                  </div>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--text-secondary,#aaa)",fontFamily:"'DM Sans',sans-serif"}}><span>55</span><span>70</span><span>85</span><span>100</span><span>115</span><span>130</span><span>160</span></div>
              </div>
            </div>

            {/* Formula */}
            <button style={{width:"100%",padding:"12px 16px",fontSize:13,fontFamily:"'DM Sans',sans-serif",fontWeight:600,color:"var(--text-secondary,#555)",background:"var(--bg-card,#fff)",border:"1px solid var(--border-color,#e0e0e0)",borderRadius:10,cursor:"pointer",textAlign:"left",marginBottom:12}} onClick={()=>setSf(f=>!f)}>
              {sf?"▾ Hide":"▸ Show"} Scoring Formula & Methodology
            </button>
            {sf&&<div style={{background:"var(--bg-card,#fff)",border:"1px solid var(--border-color,#e0e0e0)",borderRadius:12,padding:"20px 24px",marginBottom:20}}>
              <h4 style={{margin:"0 0 10px",fontFamily:"'DM Sans',sans-serif",fontSize:14,color:"var(--text-primary,#333)"}}>IQ Calculation Methodology</h4>
              <p style={S.ft}>Scoring follows the <strong>Wechsler deviation IQ convention</strong> (mean=100, SD=15), the same scale used by the WAIS-V, WISC-V, Stanford-Binet 5, and most modern clinical instruments. Percentile is computed via the <strong>Abramowitz &amp; Stegun polynomial approximation</strong> (formula 7.1.26) of the cumulative normal distribution function.</p>
              <div style={S.fs}>
                <strong>Step 1 — Difficulty-Weighted Raw Score</strong><br/>
                Each question is weighted by difficulty tier: <strong>Easy=1pt</strong>, <strong>Medium=2pt</strong>, <strong>Hard=3pt</strong>.<br/>
                This prevents score inflation from easy items alone.<br/>
                Your weighted score: <strong>{earned} / {max} = {(wPct*100).toFixed(1)}%</strong>
              </div>
              <div style={S.fs}>
                <strong>Step 2 — Z-Score via Probit Mapping</strong><br/>
                <code style={S.co}>z = (weighted_pct − 0.50) / 0.20</code><br/>
                <span style={{fontSize:12,color:"var(--text-secondary,#888)"}}>
                  0.50 = assumed population mean (average test-taker scores ~50% weighted)<br/>
                  0.20 = assumed population SD (~20% spread), z clamped to [−3, +3]
                </span><br/>
                Your z-score: <strong>{z}</strong>
              </div>
              <div style={S.fs}>
                <strong>Step 3 — Wechsler IQ Scaling</strong><br/>
                <code style={S.co}>IQ = 100 + 15 × z + time_bonus</code><br/>
                The <strong>15×z</strong> maps one population SD to 15 IQ points (Wechsler convention).<br/>
                Time bonus rewards efficiency: <code style={S.co}>bonus = round((1 − time_used/total_time) × 5)</code> = <strong>+{tBonus} pts</strong><br/>
                Final: 100 + 15 × {z} + {tBonus} = <strong>{iq}</strong>  (clamped to 55–160)
              </div>
              <div style={S.fs}>
                <strong>Step 4 — Percentile Rank</strong><br/>
                <code style={S.co}>Percentile = Φ((IQ − 100) / 15)</code><br/>
                Using <strong>Abramowitz &amp; Stegun 7.1.26</strong> polynomial approximation of the standard normal CDF.<br/>
                At IQ={iq} → z={(iq-100)/15 > 0 ? "+" : ""}{((iq-100)/15).toFixed(2)} → <strong>{pct}th percentile</strong>
              </div>
              <p style={{...S.ft,marginTop:12,fontStyle:"italic",borderTop:"1px solid var(--border-color,#e8e4de)",paddingTop:12}}>
                <strong>Important caveats:</strong> This test has not been normed on a large population sample. 
                The 50%/20% calibration parameters are estimates, not empirical norms derived from thousands of subjects. 
                A clinically administered WAIS-V uses Item Response Theory (IRT) with extensive norm groups stratified by age, 
                education, and demographics. This score should be treated as an informal estimate only.
              </p>
            </div>}

            {/* Domains */}
            <h3 style={{fontSize:13,textTransform:"uppercase",letterSpacing:3,color:"var(--text-secondary,#888)",fontFamily:"'DM Sans',sans-serif",fontWeight:600,marginBottom:12}}>Domain Performance</h3>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>
              {cats.map(c=>{const s=cs[c];return(
                <div key={c} style={{background:"var(--bg-card,#fff)",borderRadius:12,padding:"16px 20px",boxShadow:"0 1px 2px rgba(0,0,0,.04)"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span style={{fontSize:16}}>{CI[c]}</span><span style={{fontSize:14,fontWeight:500,fontFamily:"'DM Sans',sans-serif",color:"var(--text-primary,#333)"}}>{c}</span></div>
                  <div style={{height:6,background:"var(--bg-secondary,#f0f0f0)",borderRadius:3,overflow:"hidden",marginBottom:6}}><div style={{height:"100%",borderRadius:3,transition:"width .6s",width:`${s.pct}%`,background:CC[c]}}/></div>
                  <div style={{fontSize:12,color:"var(--text-secondary,#888)",fontFamily:"'DM Sans',sans-serif"}}>{s.correct}/{s.total} ({s.pct}%)</div>
                </div>
              );})}
            </div>

            <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:24}}>
              <button style={{flex:1,minWidth:180,padding:"14px 20px",fontSize:14,fontFamily:"'DM Sans',sans-serif",fontWeight:600,color:"#fff",background:"#D44",border:"none",borderRadius:10,cursor:"pointer"}} onClick={()=>{setRev(true);setRf("wrong");}}>Review Wrong ({wrong.length})</button>
              <button style={{flex:1,minWidth:120,padding:"14px 20px",fontSize:14,fontFamily:"'DM Sans',sans-serif",fontWeight:600,color:"var(--text-primary,#333)",background:"var(--bg-card,#fff)",border:"1.5px solid var(--border-color,#ddd)",borderRadius:10,cursor:"pointer"}} onClick={()=>{setRev(true);setRf("all");}}>Review All</button>
              <button style={S.rb} onClick={start}>Retake</button>
            </div>
          </>}

          {/* Review */}
          {rev&&<div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
              <button style={{background:"none",border:"none",fontSize:14,fontFamily:"'DM Sans',sans-serif",color:"var(--text-secondary,#666)",cursor:"pointer",padding:"8px 0",fontWeight:500}} onClick={()=>setRev(false)}>← Back to Results</button>
              <div style={{display:"flex",gap:4,background:"var(--bg-secondary,#f0f0f0)",borderRadius:8,padding:3}}>
                {[["wrong",wrong.length,"#D44"],["all",total,"#333"]].map(([k,n,c])=><button key={k} style={{padding:"6px 16px",fontSize:13,fontFamily:"'DM Sans',sans-serif",fontWeight:600,border:"none",borderRadius:6,cursor:"pointer",background:rf===k?c:"transparent",color:rf===k?"#fff":"var(--text-secondary,#666)"}} onClick={()=>setRf(k)}>{k==="wrong"?"Wrong":"All"} ({n})</button>)}
              </div>
            </div>
            {(rf==="wrong"?wrong:qs).map(q=>{
              const ua=ans[q.id],ic=ua===q.answer,sk=ua===undefined;
              return(
                <div key={q.id} style={{background:"var(--bg-card,#fff)",borderRadius:12,padding:"20px 24px",marginBottom:12,boxShadow:"0 1px 2px rgba(0,0,0,.04)",borderLeft:`4px solid ${ic?"#4CAF50":"#D44"}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
                    <span style={{padding:"4px 12px",borderRadius:6,fontSize:12,fontFamily:"'DM Sans',sans-serif",fontWeight:700,background:ic?"#4CAF5020":"#D4440020",color:ic?"#2E7D32":"#C62828"}}>{ic?"✓ Correct":sk?"— Skipped":"✗ Wrong"}</span>
                    <span style={{padding:"3px 10px",borderRadius:6,fontSize:11,fontFamily:"'DM Sans',sans-serif",border:`1.5px solid ${CC[q.category]}`,color:"var(--text-secondary,#666)"}}>{CI[q.category]} {q.category}</span>
                  </div>
                  <p style={{fontSize:16,lineHeight:1.6,color:"var(--text-primary,#1a1a1a)",marginBottom:14}}>{q.question}</p>
                  {q.visual&&<div style={{margin:"0 auto 14px",textAlign:"center"}} dangerouslySetInnerHTML={{__html:q.visual()}}/>}
                  <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
                    {q.options.map((o,i)=>{const ia=i===q.answer,iw=i===ua&&!ic;return(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:8,fontSize:14,fontFamily:"'DM Sans',sans-serif",border:`1.5px solid ${ia?"#4CAF50":iw?"#D44":"var(--border-color,#e0e0e0)"}`,background:ia?"#4CAF5015":iw?"#D4440015":"transparent"}}>
                        <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:26,height:26,borderRadius:6,fontSize:12,fontWeight:700,flexShrink:0,background:ia?"#4CAF50":iw?"#D44":"var(--bg-tertiary,#eee)",color:(ia||iw)?"#fff":"var(--text-secondary,#888)"}}>{ia?"✓":iw?"✗":String.fromCharCode(65+i)}</span>
                        <span style={{fontWeight:ia?600:400,color:ia?"#2E7D32":iw?"#C62828":"var(--text-primary,#333)"}}>{o}</span>
                      </div>
                    );})}
                  </div>
                  <div style={{background:"var(--bg-secondary,#F8F6F2)",borderRadius:8,padding:"12px 16px",fontSize:13,lineHeight:1.7,color:"var(--text-secondary,#555)",fontFamily:"'DM Sans',sans-serif"}}><strong>Explanation:</strong> {q.explanation}</div>
                </div>
              );
            })}
            <button style={S.rb} onClick={start}>Retake Test</button>
          </div>}
          <p style={{textAlign:"center",fontSize:12,color:"var(--text-secondary,#aaa)",fontFamily:"'DM Sans',sans-serif",lineHeight:1.6,marginTop:20,padding:"0 20px"}}>Educational estimate only. For clinical IQ, consult a licensed psychologist using WAIS-V, Stanford-Binet, or Raven's APM.</p>
        </div>
      </div>
    );
  }
  return null;
}

const S={
